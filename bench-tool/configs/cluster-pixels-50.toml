# Very aggressive small-blob filtering (min_cluster_pixels=50).
# Dramatically reduces clustering/quad fitting candidates.
# Only detects tags that are quite large in the image.
[benchmark]
iterations = 100
warmup_iterations = 10
images_folder = "./examples"
output_file = "benchmark_results.jsonl"
label = "cluster-px-50"

[detector]
nthreads = 4
quad_decimate = 2.0
quad_sigma = 0.0
refine_edges = true
decode_sharpening = 0.25
acceleration = "disabled"

[detector.qtp]
min_cluster_pixels = 50
max_nmaxima = 10
cos_critical_rad = 0.1736
max_line_fit_mse = 10.0
min_white_black_diff = 5
deglitch = false

[[families]]
name = "tag36h11"
hamming = 1
