[benchmark]
iterations = 100
warmup_iterations = 10
images_folder = "./examples"
output_file = "benchmark_results.jsonl"
label = "cpu-baseline-1thread"

[detector]
nthreads = 1
quad_decimate = 2.0
quad_sigma = 0.0
refine_edges = true
decode_sharpening = 0.25
# Options: disabled, prefer, prefer_gpu, required, required_gpu, prefer_device:N, required_device:N
acceleration = "disabled"
allow_concurrency = true
# Options: "dynamic" or "WxH" (e.g. "1920x1080") to hint expected frame size
source_dimensions = "dynamic"

[detector.qtp]
min_cluster_pixels = 5
max_nmaxima = 10
cos_critical_rad = 0.1736
max_line_fit_mse = 10.0
min_white_black_diff = 5
deglitch = false

[[families]]
name = "tag36h11"
hamming = 1
