# Maximum speed — all the cheap options.
# 4x decimation, no blur, no refinement, no sharpening,
# strict line fit, aggressive blob filter, zero error correction.
[benchmark]
iterations = 100
warmup_iterations = 10
images_folder = "./examples"
output_file = "benchmark_results.jsonl"
label = "speed-max"

[detector]
nthreads = 4
quad_decimate = 4.0
quad_sigma = 0.0
refine_edges = false
decode_sharpening = 0.0
acceleration = "disabled"

[detector.qtp]
min_cluster_pixels = 20
max_nmaxima = 10
cos_critical_rad = 0.1736
max_line_fit_mse = 2.0
min_white_black_diff = 5
deglitch = false

[[families]]
name = "tag36h11"
hamming = 0
